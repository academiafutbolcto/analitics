<!DOCTYPE html>
<html>
<head>
  <title>Leer JSONBin</title>
</head>
<body>

<h2>Datos desde JSONBin</h2>
<pre id="resultado">Cargando...</pre>

<script>
async function cargarDatos() {
  try {
    const response = await fetch("https://api.jsonbin.io/v3/b/69c3ea63c3097a1dd55b9f61/latest", {
      method: "GET",
      headers: {
        "X-Access-Key": "$2a$10$WgfLbyC50sBjcGGSePf/S.brHoos0Hq98EsxFC4rUcXY2yd0BHVYa",
        "Content-Type": "application/json"
      }
    });

    if (!response.ok) {
      throw new Error("Error HTTP: " + response.status);
    }

    const data = await response.json();

    // Mostrar datos en pantalla
    document.getElementById("resultado").textContent =
      JSON.stringify(data.record, null, 2);

    console.log("Datos:", data.record);

  } catch (error) {
    console.error(error);
    document.getElementById("resultado").textContent =
      "Error al cargar datos";
  }
}

// Ejecutar al cargar la página
cargarDatos();
</script>

</body>
</html>
